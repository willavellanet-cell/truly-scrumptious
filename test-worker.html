<!DOCTYPE html>
<html>
<head><title>Worker Test</title></head>
<body>
<h2>Worker Test</h2>
<button onclick="testWorker()" style="padding:12px 24px;font-size:16px;cursor:pointer;">Test Worker</button>
<pre id="result" style="margin-top:20px;padding:16px;background:#f0f0f0;white-space:pre-wrap;"></pre>
<script>
async function testWorker() {
  document.getElementById('result').textContent = 'Testing...';
  try {
    const response = await fetch('https://truly-scrumptious-chat.will-avellanet.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        messages: [{ role: 'user', content: 'Say hello in one sentence.' }]
      })
    });
    const text = await response.text();
    document.getElementById('result').textContent = 'Status: ' + response.status + '\n\n' + text;
  } catch(err) {
    document.getElementById('result').textContent = 'ERROR: ' + err.message;
  }
}
</script>
</body>
</html>
