# Pages CMS configuration — Truly Scrumptious Oxford
# MUST live at the repository ROOT (not inside the subdirectory).
# Site files and images live in truly-scrumptious-netlify_3/ (images are flat there).

media:
  - name: images
    label: Photos
    input: truly-scrumptious-netlify_3
    output: ""
    extensions: [jpg, jpeg, png, webp]
    categories: [image]

content:
  - name: gallery
    label: Gallery Photos
    type: file
    path: truly-scrumptious-netlify_3/gallery.json
    list: true
    fields:
      - name: src
        label: Photo
        type: image
        options:
          media: images
      - name: cat
        label: Category
        type: select
        options:
          values: [buffet, canapes, desserts]
      - name: label
        label: Caption
        type: string

  - name: homepage
    label: Homepage
    type: file
    path: truly-scrumptious-netlify_3/home.json
    fields:
      - name: hero_eyebrow
        label: "Hero — small label above title"
        type: string
      - name: hero_line1
        label: "Hero — headline line 1"
        type: string
      - name: hero_line2
        label: "Hero — headline line 2"
        type: string
      - name: hero_subtitle
        label: "Hero — subtitle"
        type: text
      - name: hero_left_image
        label: "Hero — left banner photo"
        type: image
        options:
          media: images
      - name: about_image
        label: "About section — photo"
        type: image
        options:
          media: images
      - name: about_heading_line1
        label: "About — heading line 1"
        type: string
      - name: about_heading_line2
        label: "About — heading line 2"
        type: string
      - name: about_para1
        label: "About — paragraph 1"
        type: text
      - name: about_para2
        label: "About — paragraph 2"
        type: text
      - name: card_bbq_image
        label: "Menu card — BBQ photo"
        type: image
        options:
          media: images
      - name: card_buffet_image
        label: "Menu card — Buffet photo"
        type: image
        options:
          media: images
      - name: card_canapes_image
        label: "Menu card — Canapés photo"
        type: image
        options:
          media: images
      - name: card_afternoon_image
        label: "Menu card — Afternoon Tea photo"
        type: image
        options:
          media: images
      - name: card_bespoke_image
        label: "Menu card — Bespoke photo"
        type: image
        options:
          media: images
      - name: card_whatwecater_image
        label: "Menu card — What We Cater photo"
        type: image
        options:
          media: images

  - name: menu_bbq
    label: "Menu: BBQ"
    type: file
    path: truly-scrumptious-netlify_3/menu-bbq.json
    fields:
      - name: hero_image
        label: "Hero — background photo"
        type: image
        options:
          media: images
      - name: hero_eyebrow
        label: "Hero — small label"
        type: string
      - name: hero_line1
        label: "Hero — title line 1"
        type: string
      - name: hero_line2
        label: "Hero — title line 2"
        type: string
      - name: hero_subtitle
        label: "Hero — subtitle"
        type: text
      - name: samples_intro
        label: "Sample Menus — intro paragraph"
        type: text
      - name: samples
        label: "Sample Menus (accordion)"
        type: object
        list: true
        fields:
          - name: title
            label: "Menu name"
            type: string
          - name: blurb
            label: "Short description"
            type: text
          - name: courses
            label: "Courses"
            type: object
            list: true
            fields:
              - name: course
                label: "Course heading (e.g. On the barbecue)"
                type: string
              - name: items
                label: "Dishes (one per line)"
                type: string
                list: true
      - name: cta_image
        label: "Bottom banner — background photo"
        type: image
        options:
          media: images
      - name: cta_line1
        label: "Bottom banner — heading line 1"
        type: string
      - name: cta_line2
        label: "Bottom banner — heading line 2"
        type: string
      - name: cta_subtitle
